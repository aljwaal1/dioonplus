name: Build APK Direct

concurrency:
  group: build-apk-direct
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare Flutter Android project
        run: |
          flutter --version
          flutter create --platforms=android --org com.explapp .
          rm -f test/widget_test.dart
          flutter pub get

      - name: Analyze project
        run: |
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK
        run: |
          flutter build apk --release --no-tree-shake-icons

      - name: Copy APK to apk folder
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/debt-advanced.apk

      - name: Update download file
        run: |
          echo "# تحميل التطبيق" > DOWNLOAD_APK.md
          echo "" >> DOWNLOAD_APK.md
          echo "آخر نسخة APK مباشرة:" >> DOWNLOAD_APK.md
          echo "" >> DOWNLOAD_APK.md
          echo "https://github.com/aljwaal1/dioonplus/raw/main/apk/debt-advanced.apk" >> DOWNLOAD_APK.md

      - name: Commit APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git pull --rebase --autostash origin main

          git add apk/debt-advanced.apk DOWNLOAD_APK.md
          git commit -m "Update direct APK" || echo "No changes to commit"

          git push origin main
